  <!-- Candle body -->
  <rect x="35.3" y="52.8" width="29.4" height="33.4" rx="9.7" fill="url(#ec)"/>

  <!-- Flame — base sinks into the molten top of the body -->
  <path d="M 53.1 10
           C 53.1 19.4 67.2 28.8 67.2 40
           C 67.2 50.6 59.4 58.1 50 58.1
           C 40.6 58.1 32.8 50.6 32.8 40
           C 32.8 33.8 36.3 29.1 40 24.7
           C 44.1 19.7 47.8 15.6 53.1 10 Z"
        fill="url(#ef)"/>

  <!-- Inner core -->
  <path d="M 50 32.5
           C 55 38.1 58.1 42.5 58.1 46.9
           C 58.1 52.2 54.7 55.6 50 55.6
           C 45.3 55.6 41.9 52.2 41.9 46.9
           C 41.9 42.5 45 38.1 50 32.5 Z"
        fill="url(#ek)"/>
