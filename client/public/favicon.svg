<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="fg" cx="50%" cy="30%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ff7830"/>
      <stop offset="40%"  stop-color="#e84420"/>
      <stop offset="100%" stop-color="#a82408"/>
