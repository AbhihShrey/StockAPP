<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ef" x1="50" y1="10" x2="50" y2="58.1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4a21"/>
      <stop offset="55%" stop-color="#ff8434"/>
      <stop offset="100%" stop-color="#ffbe5f"/>
    </linearGradient>
    <linearGradient id="ec" x1="50" y1="52.8" x2="50" y2="86.2" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f56f2f"/>
      <stop offset="45%" stop-color="#c8431c"/>
      <stop offset="100%" stop-color="#99290f"/>
