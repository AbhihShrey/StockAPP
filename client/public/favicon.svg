  <!-- Dark tile with a warm glow behind the mark -->
  <rect width="100" height="100" rx="24" fill="#101010"/>
  <rect width="100" height="100" rx="24" fill="url(#eg)"/>
  <rect x="0.5" y="0.5" width="99" height="99" rx="23.5"
