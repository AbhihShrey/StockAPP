<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="18" y1="80" x2="82" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Matte black tile -->
  <rect width="100" height="100" rx="22" fill="#0b0f14"/>

  <!-- Option B: market-path monogram (IA) -->
  <!-- I: slim pillar with subtle “tick” caps -->
  <path d="M24 26 V74" fill="none" stroke="url(#g)" stroke-width="4.2" stroke-linecap="round"/>
  <path d="M16.5 26 H31.5" fill="none" stroke="url(#g)" stroke-width="4.2" stroke-linecap="round"/>
  <path d="M16.5 74 H31.5" fill="none" stroke="url(#g)" stroke-width="4.2" stroke-linecap="round"/>

  <!-- A: two legs + crossbar (support level). Apex marked like a swing-high. -->
  <path d="M43 74 L64 25.5 L85 74" fill="none" stroke="url(#g)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M52.5 54 H75.5" fill="none" stroke="url(#g)" stroke-width="4.2" stroke-linecap="round"/>

  <!-- Swing-high marker ring + tiny up-zig (unique signature) -->
  <circle cx="64" cy="25.5" r="6.4" fill="#0b0f14" stroke="url(#g)" stroke-width="2.6"/>
  <path d="M58.5 34.5 L62.8 31.2 L66.2 33.9 L70.8 29.8" fill="none" stroke="#86efac" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
</svg>
